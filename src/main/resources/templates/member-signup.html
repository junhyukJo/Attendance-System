<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>민초단 회원가입</title>
	<style>
		:root {
			--bg-top: #eef8f2;
			--bg-bottom: #cfe8da;
			--panel: #ffffff;
			--line: #d8ecdf;
			--primary: #0d7d52;
			--primary-dark: #095c3c;
			--text: #13271f;
			--muted: #567066;
			--accent: #f29f05;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
			font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 15% 15%, rgba(242, 159, 5, 0.16), transparent 32%),
				radial-gradient(circle at 88% 18%, rgba(13, 125, 82, 0.18), transparent 30%),
				linear-gradient(155deg, var(--bg-top), var(--bg-bottom));
		}

		main {
			width: min(640px, 100%);
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 24px;
			padding: 34px;
			box-shadow: 0 24px 44px rgba(9, 66, 45, 0.14);
		}

		.badge {
			display: inline-block;
			padding: 7px 12px;
			border-radius: 999px;
			background: rgba(13, 125, 82, 0.1);
			color: var(--primary);
			font-size: 0.84rem;
			font-weight: 700;
			margin-bottom: 14px;
		}

		h1 {
			margin: 0 0 10px;
			font-size: clamp(1.8rem, 2.7vw, 2.3rem);
		}

		.desc {
			margin: 0 0 22px;
			color: var(--muted);
			line-height: 1.6;
		}

		form {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 16px 18px;
		}

		.field {
			display: grid;
			gap: 8px;
		}

		.field.full {
			grid-column: 1 / -1;
		}

		label {
			font-weight: 700;
			font-size: 0.94rem;
		}

		input {
			height: 46px;
			border: 1px solid #c7e3d5;
			border-radius: 12px;
			padding: 0 14px;
			font-size: 1rem;
		}

		input:focus {
			outline: 3px solid rgba(13, 125, 82, 0.18);
			border-color: var(--primary);
		}

		.helper {
			grid-column: 1 / -1;
			margin: -2px 0 0;
			color: var(--muted);
			font-size: 0.9rem;
			line-height: 1.55;
		}

		.button-row {
			grid-column: 1 / -1;
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			margin-top: 6px;
		}

		.button-row a,
		.button-row button {
			height: 48px;
			padding: 0 18px;
			border-radius: 12px;
			font-weight: 700;
			font-size: 1rem;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
		}

		.button-row button {
			border: 0;
			background: linear-gradient(135deg, var(--primary), var(--primary-dark));
			color: #fff;
		}

		.button-row a {
			background: rgba(13, 125, 82, 0.08);
			color: var(--primary-dark);
		}

		@media (max-width: 720px) {
			form {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<main>
		<span class="badge">MEMBER SIGN-UP</span>
		<h1>간편 회원가입</h1>
		<p class="desc">로그인 ID와 비밀번호, 이름, 생년월일을 입력해 기존 회원 정보와 연결하는 방식으로 가입을 진행합니다.</p>
		<form>
			<div class="field">
				<label for="loginId">아이디</label>
				<input id="loginId" name="loginId" type="text" maxlength="30" required autocomplete="username">
			</div>
			<div class="field">
				<label for="password">비밀번호</label>
				<input id="password" name="password" type="password" maxlength="100" required autocomplete="new-password">
			</div>
			<div class="field">
				<label for="name">이름</label>
				<input id="name" name="name" type="text" maxlength="50" required autocomplete="name">
			</div>
			<div class="field">
				<label for="birthDate">생년월일</label>
				<input id="birthDate" name="birthDate" type="date" required>
			</div>
			<div class="field full">
				<label for="grade">급수 (선택)</label>
				<input id="grade" name="grade" type="text" maxlength="10" placeholder="예: 구A, 전국A">
			</div>
			<p class="helper">가입 저장은 기존 회원 데이터와 연결되는 구조로 구현될 예정이며, 현재는 DB 테이블 DDL 승인 후 연결 단계만 남아 있습니다.</p>
			<div class="button-row">
				<button id="signupPrepareButton" type="button">가입하기</button>
				<a href="/member">출석 메인으로 돌아가기</a>
			</div>
		</form>
	</main>
	<script>
		document.getElementById("signupPrepareButton").addEventListener("click", function () {
			window.alert("회원 테이블 DDL 승인 후 가입 저장 기능을 연결할 예정입니다.");
		});
	</script>
</body>
</html>
