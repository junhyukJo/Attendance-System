<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>관리자 로그인</title>
	<style>
		:root {
			--bg-top: #e6f7ef;
			--bg-bottom: #cde9d9;
			--panel: #ffffff;
			--line: #d8ecdf;
			--primary: #0d7d52;
			--primary-dark: #095c3c;
			--text: #13271f;
			--muted: #567066;
			--danger-bg: #fff0f0;
			--danger-text: #b42318;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
			font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 15% 15%, rgba(242, 159, 5, 0.15), transparent 32%),
				linear-gradient(155deg, var(--bg-top), var(--bg-bottom));
		}

		main {
			width: min(460px, 100%);
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 22px;
			padding: 34px;
			box-shadow: 0 20px 40px rgba(9, 66, 45, 0.14);
		}

		.badge {
			display: inline-block;
			padding: 7px 12px;
			border-radius: 999px;
			background: rgba(13, 125, 82, 0.1);
			color: var(--primary);
			font-size: 0.84rem;
			font-weight: 700;
			margin-bottom: 14px;
		}

		h1 {
			margin: 0 0 10px;
			font-size: 2rem;
		}

		p {
			margin: 0 0 22px;
			color: var(--muted);
			line-height: 1.6;
		}

		form {
			display: grid;
			gap: 14px;
		}

		label {
			font-weight: 700;
			font-size: 0.94rem;
		}

		input {
			height: 46px;
			border: 1px solid #c7e3d5;
			border-radius: 12px;
			padding: 0 14px;
			font-size: 1rem;
		}

		input:focus {
			outline: 3px solid rgba(13, 125, 82, 0.18);
			border-color: var(--primary);
		}

		button {
			height: 48px;
			border: 0;
			border-radius: 12px;
			background: linear-gradient(135deg, var(--primary), var(--primary-dark));
			color: #fff;
			font-size: 1rem;
			font-weight: 700;
			cursor: pointer;
		}

		.error {
			margin-bottom: 18px;
			padding: 12px 14px;
			border-radius: 12px;
			background: var(--danger-bg);
			color: var(--danger-text);
			font-size: 0.93rem;
		}
	</style>
</head>
<body>
	<main>
		<span class="badge">ADMIN CONSOLE</span>
		<h1>마일리지 관리자 로그인</h1>
		<p>관리자 계정으로 로그인한 뒤 회원 마일리지 적립과 차감을 관리할 수 있습니다.</p>
		<div class="error" th:if="${loginError}" th:text="${loginError}">관리자 ID 또는 비밀번호가 올바르지 않습니다.</div>
		<form method="post" action="/admin/login">
			<label for="adminId">관리자 ID</label>
			<input id="adminId" name="adminId" type="text" required autocomplete="username">
			<label for="password">비밀번호</label>
			<input id="password" name="password" type="password" required autocomplete="current-password">
			<button type="submit">로그인</button>
		</form>
	</main>
</body>
</html>
