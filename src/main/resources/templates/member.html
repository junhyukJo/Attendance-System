<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>민초단 출석 체크</title>
	<style>
		:root {
			--bg-1: #f5fbf8;
			--bg-2: #d7efe2;
			--court: #0d7d52;
			--court-dark: #095c3c;
			--line: #f4fff9;
			--text: #14261f;
			--muted: #4c6359;
			--card: #ffffff;
			--accent: #f29f05;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 20% 15%, rgba(242, 159, 5, 0.22), transparent 38%),
				linear-gradient(140deg, var(--bg-1), var(--bg-2));
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.court {
			position: relative;
			width: min(920px, 100%);
			border-radius: 28px;
			padding: 18px;
			background: linear-gradient(145deg, var(--court), var(--court-dark));
			box-shadow: 0 20px 45px rgba(11, 70, 47, 0.28);
		}

		.court::before,
		.court::after {
			content: "";
			position: absolute;
			border: 2px solid rgba(244, 255, 249, 0.7);
			border-radius: 18px;
			pointer-events: none;
		}

		.court::before { inset: 14px; }
		.court::after { inset: 34px 50% 34px 34px; border-right: 0; }

		.panel {
			position: relative;
			background: var(--card);
			border-radius: 18px;
			padding: 34px;
			display: grid;
			grid-template-columns: 1.1fr 1fr;
			gap: 26px;
			align-items: center;
		}

		h1 {
			margin: 0 0 10px;
			font-size: clamp(1.8rem, 2.7vw, 2.4rem);
		}

		.subtitle {
			margin: 0 0 18px;
			color: var(--muted);
			line-height: 1.55;
		}

		.badge {
			display: inline-block;
			font-weight: 700;
			font-size: 0.85rem;
			padding: 7px 12px;
			border-radius: 999px;
			background: rgba(242, 159, 5, 0.16);
			color: #8f5d00;
			margin-bottom: 14px;
		}

		.info-list {
			margin: 0;
			padding: 0;
			list-style: none;
			display: grid;
			gap: 9px;
			color: #244237;
			font-size: 0.96rem;
		}

		.link-row {
			margin-top: 18px;
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
		}

		.link-row a {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			height: 44px;
			padding: 0 16px;
			border-radius: 12px;
			font-weight: 700;
			text-decoration: none;
		}

		.link-row .primary-link {
			background: linear-gradient(135deg, var(--court), var(--court-dark));
			color: #ffffff;
		}

		.link-row .secondary-link {
			background: rgba(13, 125, 82, 0.08);
			color: var(--court-dark);
		}

		.qr-wrap {
			background: #f8fcfa;
			border: 1px solid #deefe7;
			border-radius: 16px;
			padding: 18px;
			text-align: center;
		}

		.qr-wrap img {
			max-width: 100%;
			height: auto;
			display: block;
			margin: 0 auto;
			border-radius: 8px;
		}

		.qr-caption {
			margin: 12px 0 0;
			font-size: 0.92rem;
			color: var(--muted);
		}

		@media (max-width: 820px) {
			.panel {
				grid-template-columns: 1fr;
				padding: 24px;
			}
		}
	</style>
</head>
<body>
	<main class="court">
		<section class="panel" aria-label="출석 QR 코드">
			<div>
				<span class="badge">BADMINTON CLUB SERVICE</span>
				<h1>민초단 출석 체크</h1>
				<p class="subtitle">경기 시작 전 QR을 스캔하고 이름과 생년월일을 입력해 출석 등록을 완료해 주세요.</p>
				<ul class="info-list">
					<li>라켓/콕 준비 상태 확인 후 코트 입장</li>
					<li>초기 출석 시간 기준으로 참가 기록 저장</li>
					<li>등록 후 즉시 완료 화면에서 정보 확인 가능</li>
				</ul>
				<div class="link-row">
					<a class="primary-link" href="/member/signup">회원가입</a>
					<a class="secondary-link" href="/admin/login">관리자 페이지</a>
				</div>
			</div>
			<div class="qr-wrap">
				<img src="/member/qr" alt="출석 입력 QR 코드" width="320" height="320">
				<p class="qr-caption">휴대폰 카메라 또는 QR 앱으로 스캔하세요.</p>
			</div>
		</section>
	</main>
</body>
</html>
